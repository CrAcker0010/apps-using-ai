services:
  # 1. Full-Stack Web Service for Next.js App
  - type: web
    name: ai-app-generator
    runtime: node
    plan: free
    buildCommand: npm install && npx prisma generate && npx prisma db push && npm run build && npx prisma db seed
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production

      # Wire PostgreSQL Connection String automatically from the database service below
      - key: DATABASE_URL
        fromDatabase:
          name: ai-app-db
          property: connectionString

      # Auth Secret (Render will generate a unique secure random secret automatically if left empty)
      - key: NEXTAUTH_SECRET
        generateValue: true

      # The Gemini/Google API Key for conversational compilation
      - key: GOOGLE_API_KEY
        sync: false # Render will prompt you to enter this key during deployment!

      # Optional: Individual specialized Gemini API Keys if you want to override the default key
      - key: GEMINI_API_KEY_PROMPT_ENHANCER
        sync: false
        required: false
      - key: GEMINI_API_KEY_BACKEND_ARCHITECT
        sync: false
        required: false
      - key: GEMINI_API_KEY_FRONTEND_DESIGNER
        sync: false
        required: false
      - key: GEMINI_API_KEY_INTEGRATION_SPECIALIST
        sync: false
        required: false
      - key: GEMINI_API_KEY_RELEASE_MANAGER
        sync: false
        required: false

# 2. Managed PostgreSQL Database Service
databases:
  - name: ai-app-db
    plan: free
    databaseName: ai_app_generator
    user: db_admin
